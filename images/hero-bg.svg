<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#04090f"/>
      <stop offset="30%"  stop-color="#08152a"/>
      <stop offset="65%"  stop-color="#0b1e38"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </linearGradient>
    <linearGradient id="ductGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#253d5a" stop-opacity="0.95"/>
      <stop offset="20%"  stop-color="#2f5078" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#1e3752" stop-opacity="0.88"/>
      <stop offset="80%"  stop-color="#162a42" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0f1e30" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="ductGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e3250" stop-opacity="0.85"/>
      <stop offset="30%"  stop-color="#284668" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#182e48" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#0e1e30" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c3858" stop-opacity="0.65"/>
      <stop offset="25%"  stop-color="#264e78" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#1a2e4a" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#12243a" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0a1828" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="pipeGradV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a3050" stop-opacity="0.6"/>
      <stop offset="25%"  stop-color="#244870" stop-opacity="0.75"/>
      <stop offset="50%"  stop-color="#1e3c5e" stop-opacity="0.8"/>
      <stop offset="75%"  stop-color="#1a3050" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#101e30" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="acGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2d42" stop-opacity="0.92"/>
      <stop offset="50%"  stop-color="#122030" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0c1824" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="72%" cy="28%" r="45%">
      <stop offset="0%"   stop-color="#183860" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#04090f"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="12%" cy="65%" r="35%">
      <stop offset="0%"   stop-color="#0c2840" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#04090f"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#06101e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#04090f"  stop-opacity="0"/>
    </radialGradient>
    <pattern id="techGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="rgba(40,80,140,0.055)" stroke-width="0.5"/>
    </pattern>
    <pattern id="finePitch" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(30,60,100,0.03)" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- ── Base Background ── -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>
  <rect width="1440" height="900" fill="url(#finePitch)"/>
  <rect width="1440" height="900" fill="url(#techGrid)"/>
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>

  <!-- ══════════════════════════════════════
       CEILING MAIN DUCT  (横走り主ダクト)
  ══════════════════════════════════════ -->
  <rect x="0" y="55" width="1440" height="95" fill="url(#ductGrad)"/>
  <!-- top edge highlight -->
  <rect x="0" y="55" width="1440" height="4" fill="rgba(255,255,255,0.045)"/>
  <!-- center shadow band -->
  <rect x="0" y="103" width="1440" height="2" fill="rgba(0,0,0,0.18)"/>
  <!-- bottom shadow -->
  <rect x="0" y="147" width="1440" height="4" fill="rgba(0,0,0,0.28)"/>
  <!-- joint seams -->
  <line x1="240"  y1="55" x2="240"  y2="151" stroke="rgba(0,0,0,0.22)" stroke-width="1.5"/>
  <line x1="480"  y1="55" x2="480"  y2="151" stroke="rgba(0,0,0,0.22)" stroke-width="1.5"/>
  <line x1="720"  y1="55" x2="720"  y2="151" stroke="rgba(0,0,0,0.22)" stroke-width="1.5"/>
  <line x1="960"  y1="55" x2="960"  y2="151" stroke="rgba(0,0,0,0.22)" stroke-width="1.5"/>
  <line x1="1200" y1="55" x2="1200" y2="151" stroke="rgba(0,0,0,0.22)" stroke-width="1.5"/>
  <!-- bolt indicators -->
  <circle cx="120"  cy="68" r="3.5" fill="rgba(200,220,240,0.07)"/>
  <circle cx="360"  cy="68" r="3.5" fill="rgba(200,220,240,0.07)"/>
  <circle cx="600"  cy="68" r="3.5" fill="rgba(200,220,240,0.07)"/>
  <circle cx="840"  cy="68" r="3.5" fill="rgba(200,220,240,0.07)"/>
  <circle cx="1080" cy="68" r="3.5" fill="rgba(200,220,240,0.07)"/>
  <circle cx="1320" cy="68" r="3.5" fill="rgba(200,220,240,0.07)"/>
  <!-- inner panels (louver slats suggestion) -->
  <rect x="0" y="78"  width="1440" height="5" fill="rgba(0,0,0,0.08)"/>
  <rect x="0" y="90"  width="1440" height="5" fill="rgba(0,0,0,0.08)"/>
  <rect x="0" y="102" width="1440" height="5" fill="rgba(0,0,0,0.08)"/>
  <rect x="0" y="114" width="1440" height="5" fill="rgba(0,0,0,0.08)"/>
  <rect x="0" y="126" width="1440" height="5" fill="rgba(0,0,0,0.08)"/>
  <rect x="0" y="138" width="1440" height="5" fill="rgba(0,0,0,0.08)"/>

  <!-- ══════════════════════════════════════
       SECONDARY DUCT  (第2ダクト 下段)
  ══════════════════════════════════════ -->
  <rect x="0" y="200" width="1020" height="60" fill="url(#ductGrad2)" opacity="0.9"/>
  <rect x="0" y="200" width="1020" height="3"  fill="rgba(255,255,255,0.03)"/>
  <rect x="0" y="258" width="1020" height="3"  fill="rgba(0,0,0,0.22)"/>
  <line x1="204" y1="200" x2="204" y2="261" stroke="rgba(0,0,0,0.16)" stroke-width="1"/>
  <line x1="408" y1="200" x2="408" y2="261" stroke="rgba(0,0,0,0.16)" stroke-width="1"/>
  <line x1="612" y1="200" x2="612" y2="261" stroke="rgba(0,0,0,0.16)" stroke-width="1"/>
  <line x1="816" y1="200" x2="816" y2="261" stroke="rgba(0,0,0,0.16)" stroke-width="1"/>

  <!-- THIRD DUCT (short, right side) -->
  <rect x="1100" y="200" width="340" height="48" fill="url(#ductGrad2)" opacity="0.75"/>
  <rect x="1100" y="200" width="340" height="2" fill="rgba(255,255,255,0.025)"/>
  <rect x="1100" y="246" width="340" height="2" fill="rgba(0,0,0,0.18)"/>

  <!-- ══════════════════════════════════════
       VERTICAL DUCT DROPS  (縦ダクト)
  ══════════════════════════════════════ -->
  <!-- Drop A -->
  <rect x="150" y="151" width="72" height="49" fill="url(#ductGrad)" opacity="0.88"/>
  <rect x="150" y="151" width="2"  height="49" fill="rgba(255,255,255,0.03)"/>
  <rect x="220" y="151" width="2"  height="49" fill="rgba(0,0,0,0.2)"/>
  <!-- Drop B -->
  <rect x="570" y="151" width="72" height="100" fill="url(#ductGrad)" opacity="0.82"/>
  <rect x="570" y="151" width="2"  height="100" fill="rgba(255,255,255,0.025)"/>
  <rect x="640" y="151" width="2"  height="100" fill="rgba(0,0,0,0.18)"/>
  <!-- Drop C -->
  <rect x="880" y="151" width="60" height="49" fill="url(#ductGrad)" opacity="0.76"/>
  <!-- Drop D (right section) -->
  <rect x="1170" y="151" width="55" height="49" fill="url(#ductGrad)" opacity="0.7"/>

  <!-- ══════════════════════════════════════
       MAIN ROUND PIPE  (主配管)
  ══════════════════════════════════════ -->
  <rect x="0" y="305" width="740" height="40" rx="20" fill="url(#pipeGrad)"/>
  <rect x="0" y="307" width="740" height="6"  rx="3"  fill="rgba(255,255,255,0.045)"/>
  <rect x="0" y="339" width="740" height="3"  rx="1.5" fill="rgba(0,0,0,0.2)"/>

  <!-- medium pipes -->
  <rect x="800" y="318" width="640" height="28" rx="14" fill="url(#pipeGrad)" opacity="0.78"/>
  <rect x="800" y="320" width="640" height="5"  rx="2.5" fill="rgba(255,255,255,0.035)"/>

  <rect x="0"   y="368" width="460" height="20" rx="10" fill="url(#pipeGrad)" opacity="0.62"/>
  <rect x="520" y="380" width="580" height="16" rx="8"  fill="url(#pipeGrad)" opacity="0.55"/>

  <!-- small pipes -->
  <rect x="0"   y="425" width="280" height="12" rx="6" fill="url(#pipeGrad)" opacity="0.5"/>
  <rect x="340" y="436" width="380" height="9"  rx="4" fill="url(#pipeGrad)" opacity="0.45"/>
  <rect x="760" y="445" width="260" height="9"  rx="4" fill="url(#pipeGrad)" opacity="0.42"/>

  <!-- ══════════════════════════════════════
       VERTICAL PIPES  (縦配管)
  ══════════════════════════════════════ -->
  <!-- Pipe 1 – large -->
  <rect x="435" y="0" width="34" height="400" rx="17" fill="url(#pipeGradV)"/>
  <rect x="437" y="0" width="6"  height="400" rx="3"  fill="rgba(255,255,255,0.05)"/>
  <!-- Pipe 2 -->
  <rect x="885" y="0" width="26" height="340" rx="13" fill="url(#pipeGradV)" opacity="0.78"/>
  <rect x="887" y="0" width="5"  height="340" rx="2"  fill="rgba(255,255,255,0.04)"/>
  <!-- Pipe 3 -->
  <rect x="1150" y="20" width="20" height="295" rx="10" fill="url(#pipeGradV)" opacity="0.68"/>
  <!-- Pipe 4 (thin) -->
  <rect x="270" y="0" width="14" height="220" rx="7"  fill="url(#pipeGradV)" opacity="0.52"/>
  <!-- Pipe 5 (thin far right) -->
  <rect x="1340" y="0" width="14" height="260" rx="7"  fill="url(#pipeGradV)" opacity="0.5"/>

  <!-- ══════════════════════════════════════
       COMMERCIAL AC UNIT  (業務用エアコン)
  ══════════════════════════════════════ -->
  <!-- Main casing -->
  <rect x="1065" y="320" width="375" height="310" rx="12" fill="url(#acGrad)" stroke="rgba(50,100,160,0.22)" stroke-width="1.5"/>
  <!-- Inner recessed panel -->
  <rect x="1078" y="333" width="349" height="284" rx="7" fill="rgba(8,16,26,0.72)"/>
  <!-- Horizontal louvers (ルーバー) -->
  <rect x="1088" y="352" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="367" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="382" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="397" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="412" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="427" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="442" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="457" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="472" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="487" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="502" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="517" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="532" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="547" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="562" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <rect x="1088" y="577" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.25)"/>
  <rect x="1088" y="592" width="329" height="7" rx="3.5" fill="rgba(35,75,120,0.28)"/>
  <!-- Status indicator panel -->
  <rect x="1090" y="335" width="120" height="14" rx="4" fill="rgba(15,30,50,0.7)"/>
  <circle cx="1104" cy="342" r="4" fill="rgba(40,200,100,0.2)"/>
  <circle cx="1118" cy="342" r="4" fill="rgba(40,120,255,0.2)"/>
  <circle cx="1132" cy="342" r="4" fill="rgba(255,100,50,0.12)"/>
  <!-- model label area -->
  <rect x="1250" y="335" width="140" height="14" rx="4" fill="rgba(20,45,72,0.55)"/>

  <!-- Connection pipe from unit to ceiling duct -->
  <rect x="1188" y="151" width="32" height="169" fill="url(#pipeGradV)" opacity="0.65"/>
  <rect x="1190" y="151" width="5" height="169" fill="rgba(255,255,255,0.035)"/>

  <!-- ══════════════════════════════════════
       SECOND AC UNIT HINT  (右端、部分表示)
  ══════════════════════════════════════ -->
  <rect x="1390" y="360" width="100" height="250" rx="8" fill="url(#acGrad)" stroke="rgba(50,100,160,0.18)" stroke-width="1"/>
  <rect x="1400" y="372" width="80"  height="228" rx="5" fill="rgba(8,16,26,0.65)"/>
  <rect x="1404" y="386" width="72" height="6" rx="3" fill="rgba(35,75,120,0.22)"/>
  <rect x="1404" y="400" width="72" height="6" rx="3" fill="rgba(35,75,120,0.22)"/>
  <rect x="1404" y="414" width="72" height="6" rx="3" fill="rgba(35,75,120,0.22)"/>
  <rect x="1404" y="428" width="72" height="6" rx="3" fill="rgba(35,75,120,0.22)"/>

  <!-- ══════════════════════════════════════
       PERSPECTIVE FLOOR LINES  (透視床線)
  ══════════════════════════════════════ -->
  <line x1="0"    y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.08)" stroke-width="1"/>
  <line x1="240"  y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.07)" stroke-width="1"/>
  <line x1="480"  y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.06)" stroke-width="0.8"/>
  <line x1="720"  y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.08)" stroke-width="1"/>
  <line x1="960"  y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.06)" stroke-width="0.8"/>
  <line x1="1200" y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.07)" stroke-width="1"/>
  <line x1="1440" y1="900" x2="720" y2="660" stroke="rgba(20,50,90,0.08)" stroke-width="1"/>
  <!-- horizontal horizon lines -->
  <line x1="0" y1="760" x2="1440" y2="760" stroke="rgba(20,50,90,0.055)" stroke-width="0.5"/>
  <line x1="0" y1="820" x2="1440" y2="820" stroke="rgba(20,50,90,0.07)"  stroke-width="0.5"/>
  <line x1="0" y1="870" x2="1440" y2="870" stroke="rgba(20,50,90,0.08)"  stroke-width="0.5"/>

  <!-- ── Depth vignette (bottom fade) ── -->
  <rect width="1440" height="900" fill="url(#glow3)"/>
</svg>
